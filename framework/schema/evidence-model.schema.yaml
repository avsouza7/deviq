$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://deviq.dev/schema/evidence-model.schema.yaml"
title: Evidence Model
description: Schema oficial do Evidence Model do DevIQ.
type: object
additionalProperties: false

required:
  - schema_version
  - metadata
  - issue
  - session
  - analysis

properties:
  schema_version:
    type: string
    pattern: "^\d+\.\d+\.\d+$"

  metadata:
    $ref: "#/$defs/metadata"

  issue:
    $ref: "#/$defs/issue"

  git:
    $ref: "#/$defs/git"

  session:
    $ref: "#/$defs/session"

  analysis:
    $ref: "#/$defs/analysis"

  metrics:
    $ref: "#/$defs/metrics"

  knowledge:
    $ref: "#/$defs/knowledge"

  developer_notes:
    type: array
    items:
      type: string

  limitations:
    type: array
    items:
      type: string

$defs:

  metadata:
    type: object
    additionalProperties: false
    required:
      - report_id
      - framework_version
      - provider
      - generated_at
    properties:
      report_id:
        type: string
      framework_version:
        type: string
      provider:
        type: object
        additionalProperties: false
        required: [name, version]
        properties:
          name:
            type: string
          version:
            type: string
      generated_at:
        type: string
        format: date-time

  issue:
    type: object
    additionalProperties: false
    required: [key, title]
    properties:
      key:
        type: string
      title:
        type: string
      type:
        type: string
      project:
        type: string
      priority:
        type: string
      labels:
        type: array
        items:
          type: string

  git:
    type: object
    additionalProperties: false
    properties:
      repository:
        type: string
      branch:
        type: string
      commits:
        type: array
        items:
          type: string
      pull_request:
        type: string

  session:
    type: object
    additionalProperties: false
    required:
      - started_at
      - finished_at
    properties:
      started_at:
        type: string
        format: date-time
      finished_at:
        type: string
        format: date-time
      duration_seconds:
        type: integer
        minimum: 0
      confidence:
        type: number
        minimum: 0
        maximum: 1

  analysis:
    type: object
    additionalProperties: false
    required:
      - objective
      - summary
    properties:
      objective:
        type: string
      summary:
        type: string
      task_type:
        type: string
      prompt_groups:
        type: array
        items:
          type: string
      categories:
        type: array
        items:
          type: string
      collaboration_points:
        type: array
        items:
          type: string
      evidence:
        type: array
        items:
          type: string
      discarded_suggestions:
        type: array
        items:
          type: string
      assumptions:
        type: array
        items:
          type: string

  metrics:
    type: object
    additionalProperties: false
    properties:
      iai:
        type: number
      aips:
        type: number
      icp:
        type: number
      roi:
        type: number

  knowledge:
    type: object
    additionalProperties: false
    properties:
      lessons_learned:
        type: array
        items:
          type: string
      best_prompts:
        type: array
        items:
          type: string
      reusable_patterns:
        type: array
        items:
          type: string
      recommendations:
        type: array
        items:
          type: string
